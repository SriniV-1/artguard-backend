spring:
  application:
    name: artguard-gateway

  # Java 21 virtual threads for Spring MVC + @Async work. The frame fan-out to
  # the inference service runs one virtual thread per in-flight frame.
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5433/artguard
    username: artguard
    password: artguard
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.ByteArraySerializer
      properties:
        max.request.size: 10485760
        linger.ms: 2
        compression.type: lz4
    consumer:
      group-id: artguard-inference
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer
      auto-offset-reset: latest
      max-poll-records: 16
      properties:
        max.partition.fetch.bytes: 10485760
    listener:
      concurrency: 3
      ack-mode: record

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

artguard:
  # simulation = overhead people-as-dots scene (default); camera = real RTSP/video + YOLOv8
  mode: simulation
  # gRPC inference service (Python/YOLOv8) — used in camera mode
  inference:
    host: localhost
    port: 50051
    deadline-ms: 800
  kafka:
    frames-topic: artguard.frames
    # bounded in-flight frames per camera before we drop (backpressure)
    max-in-flight-per-camera: 8
  # Alerting: person detections (movement in the scene) are the common alert;
  # weapons / unattended items are rare and must clear a much higher confidence.
  alerting:
    threshold: 0.45
    alert-labels: person,knife,scissors,backpack,suitcase,handbag
    rare-labels: knife,scissors,backpack,suitcase,handbag
    rare-threshold: 0.90
  cameras:
    # Zones in the facility. In simulation mode these are overhead views with
    # people as dots; in camera mode set type=video/rtsp with a url.
    sources:
      - id: cam-01
        name: West Concourse
        type: simulated
      - id: cam-02
        name: Main Gallery
        type: simulated
      - id: cam-03
        name: North Entrance
        type: simulated
      - id: cam-04
        name: Loading Dock
        type: simulated
      - id: cam-05
        name: Central Atrium
        type: simulated
      - id: cam-06
        name: Storage Wing
        type: simulated
